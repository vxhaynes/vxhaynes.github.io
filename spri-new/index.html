<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New Books at Springfield Township Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="site-header">
      <div>
        <h1>New Books at Springfield Township Library</h1>
        <p>The ten most recently added adult fiction and nonfiction books.</p>
      </div>
      <div class="controls" aria-label="List controls">
        <button id="refreshBtn" type="button" class="secondary">Refresh</button>
        <button id="printBtn" type="button" disabled>Checking lists...</button>
        <p id="status" class="status" role="status">Loading catalog data…</p>
      </div>
    </header>

    <div id="notice" class="notice" hidden></div>
    <div id="error" class="error" hidden></div>

    <section class="list-section" aria-labelledby="fictionHeading">
      <div class="section-head">
        <h2 id="fictionHeading">Adult Fiction</h2>
        <span id="fictionCount" class="count"></span>
      </div>
      <div id="fictionList" class="book-grid" aria-live="polite"></div>
    </section>

    <section class="list-section" aria-labelledby="nonfictionHeading">
      <div class="section-head">
        <h2 id="nonfictionHeading">Adult Nonfiction</h2>
        <span id="nonfictionCount" class="count"></span>
      </div>
      <div id="nonfictionList" class="book-grid" aria-live="polite"></div>
    </section>

    <footer id="footerStamp"></footer>
  </main>

  <template id="loadingCardTemplate">
    <article class="book-card loading-card" aria-hidden="true">
      <div class="cover-placeholder">Loading</div>
      <div>
        <div class="loading-line long"></div>
        <div class="loading-line medium"></div>
        <div class="loading-line short"></div>
      </div>
    </article>
  </template>

  <script src="main.js" defer></script>
</body>
</html>
