<!DOCTYPE html>
<html>
   <head>
      <title>NYT Test Catalog</title>
   </head>
   <body>
      <div
         id="spri-nyt-bestsellers"
         data-worker-url="https://spri-nyt-list.vxavier000.workers.dev"></div>
      <style>
         #spri-nyt-bestsellers {
         font-family: inherit;
         }
         .spri-nyt-grid {
         display: grid;
         grid-template-columns: 1fr 1fr;
         gap: 1.25rem;
         }
         .spri-nyt-column h2 {
         margin: 0 0 .25rem;
         font-size: 1.2rem;
         }
         .spri-nyt-date {
         margin-bottom: .75rem;
         color: #555;
         font-size: .9rem;
         }
         .spri-nyt-list {
         list-style: none;
         margin: 0;
         padding: 0;
         }
         .spri-nyt-item {
         border-top: 1px solid #ddd;
         padding: .75rem 0;
         }
         .spri-nyt-title {
         font-weight: 700;
         }
         .spri-nyt-author,
         .spri-nyt-desc,
         .spri-nyt-status,
         .spri-nyt-link {
         margin-top: .25rem;
         font-size: .92rem;
         }
         .spri-nyt-desc {
         color: #444;
         }
         .spri-nyt-status {
         font-weight: 700;
         }
         .spri-nyt-status[data-status="available"] {
         color: #116611;
         }
         .spri-nyt-status[data-status="owned-unavailable"] {
         color: #8a5a00;
         }
         .spri-nyt-status[data-status="not-found"] {
         color: #777;
         }
         .spri-nyt-error {
         border: 1px solid #ddd;
         padding: .75rem;
         }
         @media (max-width: 700px) {
         .spri-nyt-grid {
         grid-template-columns: 1fr;
         }
         }
      </style>
      <script>
         (function () {
           const root = document.getElementById("spri-nyt-bestsellers");
           if (!root) return;
         
           const workerUrl = String(root.dataset.workerUrl || "").replace(/\/$/, "");
         
           const lists = [
             {
               key: "hardcover-fiction",
               heading: "Fiction"
             },
             {
               key: "hardcover-nonfiction",
               heading: "Nonfiction"
             }
           ];
         
           function escapeHtml(value) {
             return String(value || "").replace(/[&<>"']/g, function (char) {
               return {
                 "&": "&amp;",
                 "<": "&lt;",
                 ">": "&gt;",
                 '"': "&quot;",
                 "'": "&#039;"
               }[char];
             });
           }
         
           function cleanIsbn(value) {
             return String(value || "").replace(/[^0-9X]/gi, "");
           }
         
           function makeBookId(listKey, index) {
             return "spri-nyt-" + listKey.replace(/[^a-z0-9]/gi, "-") + "-" + index;
           }
         
           function renderLoading() {
             root.innerHTML = `
               <div class="spri-nyt-grid">
                 <section class="spri-nyt-column">
                   <h2>Fiction</h2>
                   <div class="spri-nyt-date">Loading…</div>
                 </section>
                 <section class="spri-nyt-column">
                   <h2>Nonfiction</h2>
                   <div class="spri-nyt-date">Loading…</div>
                 </section>
               </div>
             `;
           }
         
           function renderError(message) {
             root.innerHTML = `
               <div class="spri-nyt-error">
                 ${escapeHtml(message)}
               </div>
             `;
           }
         
           async function fetchJson(url) {
             const response = await fetch(url);
         
             if (!response.ok) {
               throw new Error("Request failed: " + response.status);
             }
         
             return await response.json();
           }
         
           async function loadList(list) {
             const data = await fetchJson(
               workerUrl + "/nyt?list=" + encodeURIComponent(list.key)
             );
         
             return {
               ...list,
               publishedDate: data.published_date || "",
               books: Array.isArray(data.books) ? data.books : []
             };
           }
         
           function renderLists(listData) {
             root.innerHTML = `
               <div class="spri-nyt-grid">
                 ${listData.map(function (list) {
                   return `
                     <section class="spri-nyt-column">
                       <h2>${escapeHtml(list.heading)}</h2>
                       <div class="spri-nyt-date">
                         ${list.publishedDate ? "Published " + escapeHtml(list.publishedDate) : ""}
                       </div>
                       <ol class="spri-nyt-list">
                         ${list.books.map(function (book, index) {
                           const id = makeBookId(list.key, index);
         
                           return `
                             <li class="spri-nyt-item" id="${escapeHtml(id)}">
                               <div class="spri-nyt-title">
                                 #${escapeHtml(book.rank || index + 1)} ${escapeHtml(book.title)}
                               </div>
                               <div class="spri-nyt-author">
                                 by ${escapeHtml(book.author)}
                               </div>
                               ${book.description ? `
                                 <div class="spri-nyt-desc">
                                   ${escapeHtml(book.description)}
                                 </div>
                               ` : ""}
                               <div class="spri-nyt-status" data-status="checking">
                                 Checking availability…
                               </div>
                               <div class="spri-nyt-link"></div>
                             </li>
                           `;
                         }).join("")}
                       </ol>
                     </section>
                   `;
                 }).join("")}
               </div>
             `;
           }
         
           async function checkAvailability(list, book, index) {
             const id = makeBookId(list.key, index);
             const item = document.getElementById(id);
             if (!item) return;
         
             const statusEl = item.querySelector(".spri-nyt-status");
             const linkEl = item.querySelector(".spri-nyt-link");
         
             const isbn = cleanIsbn(book.primary_isbn13 || book.primary_isbn10);
         
             const params = new URLSearchParams();
             params.set("isbn", isbn);
             params.set("title", book.title || "");
             params.set("author", book.author || "");
         
             try {
               const data = await fetchJson(workerUrl + "/catalog?" + params.toString());
         
               statusEl.textContent = data.label || "Check catalog";
               statusEl.dataset.status = data.status || "unknown";
         
               if (data.catalog_url) {
                 linkEl.innerHTML = `
                   <a href="${escapeHtml(data.catalog_url)}" target="_blank" rel="noopener">
                     View in catalog
                   </a>
                 `;
               }
             } catch (error) {
               statusEl.textContent = "Catalog check failed";
               statusEl.dataset.status = "error";
             }
           }
         
           async function checkAllAvailability(listData) {
             for (const list of listData) {
               list.books.forEach(function (book, index) {
                 checkAvailability(list, book, index);
               });
             }
           }
         
           async function init() {
             if (!workerUrl) {
               renderError("Missing Cloudflare Worker URL.");
               return;
             }
         
             renderLoading();
         
             try {
               const listData = await Promise.all(lists.map(loadList));
               renderLists(listData);
               checkAllAvailability(listData);
             } catch (error) {
               renderError("The bestseller lists could not be loaded.");
             }
           }
         
           init();
         })();
      </script>
   </body>
</html>
