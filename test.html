<!DOCTYPE html>
<html>
   <head>
      <title>NYT Test Catalog</title>
   </head>

   <body>
      <div
        id="spri-nyt-bestsellers"
        data-worker-url="https://spri-nyt-list.vxavier000.workers.dev">
      </div>
      
      <style>
        #spri-nyt-bestsellers {
          font-family: inherit;
        }
      
        .spri-nyt-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 1.25rem;
        }
      
        .spri-nyt-column h2 {
          margin: 0 0 .35rem;
          font-size: 1.35rem;
        }
      
        .spri-nyt-date {
          margin-bottom: .85rem;
          color: #555;
          font-size: 1rem;
        }
      
        .spri-nyt-list {
          list-style: none;
          margin: 0;
          padding: 0;
        }
      
        .spri-nyt-item {
          border-top: 1px solid #ddd;
          padding: .9rem 0;
        }
      
        .spri-nyt-book {
          display: flex;
          gap: .9rem;
          align-items: flex-start;
        }
      
        .spri-nyt-cover-wrap {
          flex: 0 0 auto;
        }
      
        .spri-nyt-cover-wrap a {
          display: inline-block;
        }
      
        .spri-nyt-cover-wrap a:focus {
          outline: 2px solid currentColor;
          outline-offset: 2px;
        }
      
        .spri-nyt-cover {
          width: 68px;
          max-height: 102px;
          object-fit: cover;
          border: 1px solid #ddd;
        }
      
        .spri-nyt-info {
          min-width: 0;
        }
      
        .spri-nyt-title {
          font-weight: 700;
          font-size: 1.05rem;
          line-height: 1.3;
        }
      
        .spri-nyt-title a,
        .spri-nyt-status a {
          color: inherit;
          text-decoration: underline;
        }
      
        .spri-nyt-title a:hover,
        .spri-nyt-status a:hover {
          text-decoration-thickness: 2px;
        }
      
        .spri-nyt-author,
        .spri-nyt-desc,
        .spri-nyt-status,
        .spri-nyt-libby {
          margin-top: .3rem;
          font-size: 1rem;
          line-height: 1.35;
        }
      
        .spri-nyt-desc {
          color: #444;
        }
      
        .spri-nyt-status {
          font-weight: 700;
        }
      
        .spri-nyt-status[data-status="available"] {
          color: #116611;
        }
      
        .spri-nyt-status[data-status="checked-out"] {
          color: #8a5a00;
        }
      
        .spri-nyt-status[data-status="not-available"],
        .spri-nyt-status[data-status="not-found"] {
          color: #777;
        }
      
        .spri-nyt-libby {
          margin-top: .45rem;
        }
      
        .spri-nyt-libby a {
          display: inline-block;
          margin-right: .85rem;
        }
      
        .spri-nyt-error {
          border: 1px solid #ddd;
          padding: .75rem;
        }
      
        @media (max-width: 700px) {
          #spri-nyt-bestsellers {
            width: 100%;
          }
      
          .spri-nyt-grid {
            grid-template-columns: 1fr;
            gap: 1.75rem;
          }
      
          .spri-nyt-column h2 {
            font-size: 1.25rem;
          }
      
          .spri-nyt-item {
            padding: .85rem 0;
          }
      
          .spri-nyt-book {
            gap: .8rem;
          }
      
          .spri-nyt-cover {
            width: 58px;
            max-height: 87px;
          }
      
          .spri-nyt-title {
            font-size: 1.02rem;
            line-height: 1.3;
          }
      
          .spri-nyt-author,
          .spri-nyt-desc,
          .spri-nyt-status,
          .spri-nyt-libby {
            font-size: .95rem;
            line-height: 1.35;
          }
      
          .spri-nyt-desc {
            margin-top: .35rem;
          }
        }
      
        @media (max-width: 420px) {
          .spri-nyt-book {
            gap: .7rem;
          }
      
          .spri-nyt-cover {
            width: 52px;
            max-height: 78px;
          }
      
          .spri-nyt-title {
            font-size: .98rem;
          }
      
          .spri-nyt-author,
          .spri-nyt-desc,
          .spri-nyt-status,
          .spri-nyt-libby {
            font-size: .9rem;
          }
        }
      </style>
      
      <script>
      (function () {
        const root = document.getElementById("spri-nyt-bestsellers");
        if (!root) return;
      
        const workerUrl = String(root.dataset.workerUrl || "").replace(/\/$/, "");
      
        const lists = [
          {
            key: "hardcover-fiction",
            heading: "Fiction"
          },
          {
            key: "hardcover-nonfiction",
            heading: "Nonfiction"
          }
        ];
      
        function escapeHtml(value) {
          return String(value || "").replace(/[&<>"']/g, function (char) {
            return {
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;"
            }[char];
          });
        }
      
        function cleanIsbn(value) {
          return String(value || "").replace(/[^0-9X]/gi, "");
        }
      
        function getBookIsbns(book) {
          const rawIsbns = [];
      
          if (Array.isArray(book.isbns)) {
            book.isbns.forEach(function (entry) {
              if (typeof entry === "string") {
                rawIsbns.push(entry);
              } else if (entry && typeof entry === "object") {
                if (entry.isbn13) rawIsbns.push(entry.isbn13);
                if (entry.isbn10) rawIsbns.push(entry.isbn10);
              }
            });
          }
      
          if (book.primary_isbn13) rawIsbns.push(book.primary_isbn13);
          if (book.primary_isbn10) rawIsbns.push(book.primary_isbn10);
      
          return Array.from(
            new Set(
              rawIsbns
                .map(cleanIsbn)
                .filter(Boolean)
            )
          );
        }
      
        function getCoverIsbn(book) {
          const isbns = getBookIsbns(book);
          return isbns[0] || "";
        }
      
        function makeCoverUrl(book) {
          const isbn = getCoverIsbn(book);
          return isbn ? "https://static01.nyt.com/bestsellers/images/" + isbn + ".jpg" : "";
        }
      
        function makeMelUrl(book) {
          const isbn = getCoverIsbn(book);
          return isbn ? "https://search.mel.org/iii/encore/search/C__S" + encodeURIComponent(isbn) : "";
        }
      
        function makeBookId(listKey, index) {
          return "spri-nyt-" + listKey.replace(/[^a-z0-9]/gi, "-") + "-" + index;
        }
      
        function renderLoading() {
          root.innerHTML = `
            <div class="spri-nyt-grid">
              <section class="spri-nyt-column">
                <h2>Adult Fiction</h2>
                <div class="spri-nyt-date">Loading…</div>
              </section>
              <section class="spri-nyt-column">
                <h2>Adult Nonfiction</h2>
                <div class="spri-nyt-date">Loading…</div>
              </section>
            </div>
          `;
        }
      
        function renderError(message) {
          root.innerHTML = `
            <div class="spri-nyt-error">
              ${escapeHtml(message)}
            </div>
          `;
        }
      
        async function fetchJson(url) {
          const response = await fetch(url);
          const data = await response.json();
      
          if (!response.ok) {
            throw new Error(data.detail || data.error || "Request failed: " + response.status);
          }
      
          return data;
        }
      
        async function loadList(list) {
          const data = await fetchJson(
            workerUrl + "/nyt?list=" + encodeURIComponent(list.key)
          );
      
          return {
            ...list,
            publishedDate: data.published_date || "",
            books: Array.isArray(data.books) ? data.books : []
          };
        }
      
        function renderLists(listData) {
          root.innerHTML = `
            <div class="spri-nyt-grid">
              ${listData.map(function (list) {
                return `
                  <section class="spri-nyt-column">
                    <h2>${escapeHtml(list.heading)}</h2>
                    <div class="spri-nyt-date">
                      ${list.publishedDate ? "Week ending " + escapeHtml(list.publishedDate) : ""}
                    </div>
      
                    <ol class="spri-nyt-list">
                      ${list.books.map(function (book, index) {
                        const id = makeBookId(list.key, index);
                        const coverUrl = makeCoverUrl(book);
      
                        return `
                          <li class="spri-nyt-item" id="${escapeHtml(id)}">
                            <div class="spri-nyt-book">
                              ${coverUrl ? `
                                <span class="spri-nyt-cover-wrap">
                                  <img
                                    class="spri-nyt-cover"
                                    src="${escapeHtml(coverUrl)}"
                                    alt=""
                                    loading="lazy"
                                    onerror="this.closest('.spri-nyt-cover-wrap').remove();"
                                  >
                                </span>
                              ` : ""}
      
                              <div class="spri-nyt-info">
                                <div class="spri-nyt-title">
                                  #${escapeHtml(book.rank || index + 1)} ${escapeHtml(book.title)}
                                </div>
      
                                <div class="spri-nyt-author">
                                  by ${escapeHtml(book.author)}
                                </div>
      
                                ${book.description ? `
                                  <div class="spri-nyt-desc">
                                    ${escapeHtml(book.description)}
                                  </div>
                                ` : ""}
      
                                <div class="spri-nyt-status" data-status="checking">
                                  Checking availability...
                                </div>
      
                                <div class="spri-nyt-libby"></div>
                              </div>
                            </div>
                          </li>
                        `;
                      }).join("")}
                    </ol>
                  </section>
                `;
              }).join("")}
            </div>
          `;
        }
      
        function applyCatalogLink(item, book, data) {
          const titleEl = item.querySelector(".spri-nyt-title");
          const coverWrap = item.querySelector(".spri-nyt-cover-wrap");
          const statusEl = item.querySelector(".spri-nyt-status");
      
          const linkUrl = data.status === "not-found"
            ? makeMelUrl(book)
            : data.catalog_url;
      
          if (!linkUrl) return;
      
          if (titleEl && !titleEl.querySelector("a")) {
            const currentTitle = titleEl.innerHTML;
      
            titleEl.innerHTML = `
              <a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener">
                ${currentTitle}
              </a>
            `;
          }
      
          if (coverWrap && !coverWrap.querySelector("a")) {
            coverWrap.innerHTML = `
              <a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener">
                ${coverWrap.innerHTML}
              </a>
            `;
          }
      
          if (statusEl && !statusEl.querySelector("a")) {
            const currentStatus = statusEl.textContent;
      
            statusEl.innerHTML = `
              <a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener">
                ${escapeHtml(currentStatus)}
              </a>
            `;
          }
        }
      
        function renderLibbyLinks(item, data) {
          const libbyEl = item.querySelector(".spri-nyt-libby");
          if (!libbyEl) return;
      
          const libbyLinks = data.libby_links || {};
          const links = [];
      
          if (libbyLinks.ebook_url) {
            links.push(`
              <a href="${escapeHtml(libbyLinks.ebook_url)}" target="_blank" rel="noopener">
                🕮 Read Libby eBook
              </a>
            `);
          }
      
          if (libbyLinks.eaudiobook_url) {
            links.push(`
              <a href="${escapeHtml(libbyLinks.eaudiobook_url)}" target="_blank" rel="noopener">
                🕪 Listen to Libby audiobook
              </a>
            `);
          }
      
          libbyEl.innerHTML = links.join(" ");
        }
      
        async function checkAvailability(list, book, index) {
          const id = makeBookId(list.key, index);
          const item = document.getElementById(id);
          if (!item) return;
      
          const statusEl = item.querySelector(".spri-nyt-status");
          const isbns = getBookIsbns(book);
      
          const params = new URLSearchParams();
          params.set("isbns", isbns.join(","));
      
          try {
            const data = await fetchJson(workerUrl + "/catalog?" + params.toString());
      
            statusEl.textContent = data.label || data.error || "Check catalog";
            statusEl.dataset.status = data.status || "unknown";
      
            applyCatalogLink(item, book, data);
            renderLibbyLinks(item, data);
          } catch (error) {
            statusEl.textContent = "Catalog check failed: " + String(error.message || error);
            statusEl.dataset.status = "error";
          }
        }
      
        function checkAllAvailability(listData) {
          listData.forEach(function (list) {
            list.books.forEach(function (book, index) {
              checkAvailability(list, book, index);
            });
          });
        }
      
        async function init() {
          if (!workerUrl) {
            renderError("Missing Cloudflare Worker URL.");
            return;
          }
      
          renderLoading();
      
          try {
            const listData = await Promise.all(lists.map(loadList));
            renderLists(listData);
            checkAllAvailability(listData);
          } catch (error) {
            renderError("The bestseller lists could not be loaded.");
          }
        }
      
        init();
      })();
      </script>
   </body>
</html>
