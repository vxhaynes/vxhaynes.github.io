<!DOCTYPE html>
<html>
   <head>
      <title>NYT Test Catalog</title>
   </head>

   <body>
      <div
        id="spri-nyt-bestsellers"
        data-worker-url="https://spri-nyt-list.vxavier000.workers.dev">
      </div>
      
      <style>
         @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap");

         #spri-nyt-bestsellers {
           --spri-green: #008037;
           --spri-blue: #5271ff;
           --spri-black: #111;
           --spri-light: #f7faf8;
         
           font-family: "Open Sauce", "Open Sauce One", Arial, Helvetica, sans-serif;
           color: var(--spri-black);
           max-width: 1100px;
           margin: 0 auto;
         }
         
         .spri-print-actions {
           text-align: right;
           margin: 0 0 1rem;
         }
         
         .spri-print-button {
           border: 2px solid var(--spri-green);
           background: #fff;
           color: var(--spri-green);
           padding: .55rem .9rem;
           font-family: "Kollektif", Arial, Helvetica, sans-serif;
           font-weight: 700;
           cursor: pointer;
         }
         
         .spri-print-button:hover {
           background: var(--spri-green);
           color: #fff;
         }
         
         .spri-nyt-grid {
           display: block;
         }
         
         .spri-nyt-column {
           background: #fff;
           margin: 0 auto 2.25rem;
           padding: 1rem 1rem 1.25rem;
           box-sizing: border-box;
           border-top: 6px solid var(--spri-green);
         }
         
         .spri-nyt-header {
           background: linear-gradient(90deg, var(--spri-green), var(--spri-blue));
           color: #fff;
           display: grid;
           grid-template-columns: 105px 1fr;
           gap: 1rem;
           align-items: center;
           padding: 1rem 1.25rem;
           margin-bottom: 1.35rem;
         }
         
         .spri-brand-logo {
           width: 100px;
           height: 100px;
           object-fit: contain;
           background: #fff;
           border-radius: 50%;
           padding: .35rem;
         }
         
         .spri-header-text {
           text-align: left;
         }
         
         .spri-brand-name {
           font-family: "Bebas Neue", Impact, sans-serif;
           font-size: 2rem;
           letter-spacing: .04em;
           line-height: 1;
           margin: 0 0 .25rem;
         }
         
         .spri-list-title {
           font-family: "Kollektif", Arial, Helvetica, sans-serif;
           font-size: 2.25rem;
           font-weight: 700;
           line-height: 1.05;
           margin: 0;
         }
         
         .spri-nyt-date {
           margin-top: .45rem;
           color: #fff;
           font-size: 1.15rem;
           font-family: "Open Sauce", "Open Sauce One", Arial, Helvetica, sans-serif;
         }
         
         .spri-nyt-list {
           list-style: none;
           margin: 0;
           padding: 0;
           display: grid;
           grid-template-columns: repeat(3, 1fr);
           column-gap: 1rem;
           row-gap: 1rem;
         }
         
         .spri-nyt-item {
           padding: 0;
           border: 0;
           break-inside: avoid;
           page-break-inside: avoid;
         }
         
         .spri-nyt-book {
           display: grid;
           grid-template-columns: 112px 1fr;
           gap: .65rem;
           align-items: start;
         }
         
         .spri-nyt-cover-wrap {
           display: block;
         }
         
         .spri-nyt-cover-wrap a {
           display: block;
         }
         
         .spri-nyt-cover {
           width: 112px;
           height: 168px;
           object-fit: cover;
           border: 2px solid #eee;
           box-shadow: 0 1px 4px rgba(0,0,0,.22);
         }
         
         .spri-nyt-info {
           min-width: 0;
         }
         
         .spri-nyt-title {
           font-family: "Kollektif", Arial, Helvetica, sans-serif;
           font-weight: 800;
           font-size: 1.08rem;
           line-height: 1.05;
         }
         
         .spri-nyt-title a,
         .spri-nyt-status a {
           color: inherit;
           text-decoration: none;
         }
         
         .spri-nyt-title a:hover,
         .spri-nyt-status a:hover {
           text-decoration: underline;
         }
         
         .spri-nyt-author {
           margin-top: .12rem;
           font-size: .92rem;
           line-height: 1.08;
         }
         
         .spri-nyt-desc {
           margin-top: .2rem;
           color: #111;
           font-size: .84rem;
           line-height: 1.12;
         }
         
         .spri-nyt-status {
           margin-top: .32rem;
           font-weight: 800;
           font-size: .82rem;
           line-height: 1.1;
           font-family: "Kollektif", Arial, Helvetica, sans-serif;
         }
         
         .spri-nyt-status[data-status="available"] {
           color: var(--spri-green);
         }
         
         .spri-nyt-status[data-status="checked-out"] {
           color: #8a5a00;
         }
         
         .spri-nyt-status[data-status="not-available"],
         .spri-nyt-status[data-status="not-found"] {
           color: #666;
         }
         
         .spri-nyt-libby {
           margin-top: .25rem;
           font-size: .8rem;
           line-height: 1.14;
         }
         
         .spri-nyt-libby a {
           display: block;
           margin: .08rem 0 0;
           color: var(--spri-blue);
           font-weight: 700;
           text-decoration: none;
         }
         
         .spri-nyt-libby a:hover {
           text-decoration: underline;
         }
         
         .spri-nyt-error {
           border: 1px solid #ddd;
           padding: .75rem;
         }
         
         /* Tablet */
         @media (max-width: 900px) {
           .spri-nyt-list {
             grid-template-columns: repeat(2, 1fr);
           }
         
           .spri-nyt-header {
             grid-template-columns: 85px 1fr;
           }
         
           .spri-brand-logo {
             width: 82px;
             height: 82px;
           }
         
           .spri-list-title {
             font-size: 1.9rem;
           }
         }
         
         /* Phone */
         @media (max-width: 600px) {
           #spri-nyt-bestsellers {
             max-width: none;
           }
         
           .spri-print-actions {
             text-align: left;
           }
         
           .spri-nyt-column {
             padding: .75rem;
           }
         
           .spri-nyt-header {
             grid-template-columns: 64px 1fr;
             gap: .75rem;
             padding: .85rem;
             margin-bottom: 1rem;
           }
         
           .spri-brand-logo {
             width: 62px;
             height: 62px;
             padding: .2rem;
           }
         
           .spri-brand-name {
             font-size: 1.35rem;
           }
         
           .spri-list-title {
             font-size: 1.45rem;
           }
         
           .spri-nyt-date {
             font-size: .95rem;
           }
         
           .spri-nyt-list {
             grid-template-columns: 1fr;
             row-gap: .9rem;
           }
         
           .spri-nyt-book {
             grid-template-columns: 78px 1fr;
             gap: .7rem;
           }
         
           .spri-nyt-cover {
             width: 78px;
             height: 117px;
           }
         
           .spri-nyt-title {
             font-size: 1rem;
             line-height: 1.12;
           }
         
           .spri-nyt-author,
           .spri-nyt-desc,
           .spri-nyt-status,
           .spri-nyt-libby {
             font-size: .9rem;
             line-height: 1.18;
           }
         }
         
         /* Print */
         @media print {
           @page {
             size: letter portrait;
             margin: .35in;
           }
         
           body {
             margin: 0;
             background: #fff;
           }
         
           .spri-print-actions {
             display: none !important;
           }
         
           #spri-nyt-bestsellers {
             max-width: none;
             margin: 0;
           }
         
           .spri-nyt-column {
             width: 100%;
             margin: 0;
             padding: 0;
             border-top: 0;
             page-break-after: always;
             break-after: page;
           }
         
           .spri-nyt-column:last-child {
             page-break-after: auto;
             break-after: auto;
           }
         
           .spri-nyt-header {
             background: linear-gradient(90deg, #008037, #5271ff) !important;
             color: #fff !important;
             -webkit-print-color-adjust: exact;
             print-color-adjust: exact;
             grid-template-columns: .82in 1fr;
             gap: .16in;
             padding: .22in .28in;
             margin: 0 0 .22in;
           }
         
           .spri-brand-logo {
             width: .78in;
             height: .78in;
             padding: .04in;
             box-shadow: none;
           }
         
           .spri-brand-name {
             font-size: 18pt;
           }
         
           .spri-list-title {
             font-size: 27pt;
           }
         
           .spri-nyt-date {
             font-size: 14pt;
             margin-top: .06in;
           }
         
           .spri-nyt-list {
             grid-template-columns: repeat(3, 1fr);
             column-gap: .17in;
             row-gap: .13in;
           }
         
           .spri-nyt-book {
             grid-template-columns: .9in 1fr;
             gap: .08in;
           }
         
           .spri-nyt-cover {
             width: .9in;
             height: 1.35in;
             box-shadow: none;
             border: 0;
           }
         
           .spri-nyt-title {
             font-size: 9.7pt;
             line-height: .96;
           }
         
           .spri-nyt-author {
             font-size: 8.2pt;
             line-height: .96;
           }
         
           .spri-nyt-desc {
             font-size: 7.3pt;
             line-height: .98;
           }
         
           .spri-nyt-status,
           .spri-nyt-libby {
             font-size: 6.8pt;
             line-height: .95;
           }
         
           .spri-nyt-title a,
           .spri-nyt-status a,
           .spri-nyt-libby a {
             text-decoration: none;
           }
         }
      </style>
      
      <script>
      (function () {
        const root = document.getElementById("spri-nyt-bestsellers");
        if (!root) return;
      
        const workerUrl = String(root.dataset.workerUrl || "").replace(/\/$/, "");
      
        const lists = [
          {
            key: "hardcover-fiction",
            heading: "Fiction"
          },
          {
            key: "hardcover-nonfiction",
            heading: "Nonfiction"
          }
        ];
      
        function escapeHtml(value) {
          return String(value || "").replace(/[&<>"']/g, function (char) {
            return {
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;"
            }[char];
          });
        }
      
        function cleanIsbn(value) {
          return String(value || "").replace(/[^0-9X]/gi, "");
        }
      
        function getBookIsbns(book) {
          const rawIsbns = [];
      
          if (Array.isArray(book.isbns)) {
            book.isbns.forEach(function (entry) {
              if (typeof entry === "string") {
                rawIsbns.push(entry);
              } else if (entry && typeof entry === "object") {
                if (entry.isbn13) rawIsbns.push(entry.isbn13);
                if (entry.isbn10) rawIsbns.push(entry.isbn10);
              }
            });
          }
      
          if (book.primary_isbn13) rawIsbns.push(book.primary_isbn13);
          if (book.primary_isbn10) rawIsbns.push(book.primary_isbn10);
      
          return Array.from(
            new Set(
              rawIsbns
                .map(cleanIsbn)
                .filter(Boolean)
            )
          );
        }
      
        function getCoverIsbn(book) {
          const isbns = getBookIsbns(book);
          return isbns[0] || "";
        }
      
        function makeCoverUrl(book) {
          const isbn = getCoverIsbn(book);
          return isbn ? "https://static01.nyt.com/bestsellers/images/" + isbn + ".jpg" : "";
        }
      
        function makeMelUrl(book) {
          const isbn = getCoverIsbn(book);
          return isbn ? "https://search.mel.org/iii/encore/search/C__S" + encodeURIComponent(isbn) : "";
        }
      
        function makeBookId(listKey, index) {
          return "spri-nyt-" + listKey.replace(/[^a-z0-9]/gi, "-") + "-" + index;
        }
      
        function renderLoading() {
          root.innerHTML = `
            <div class="spri-nyt-grid">
              <section class="spri-nyt-column">
                <h2>Adult Fiction</h2>
                <div class="spri-nyt-date">Loading…</div>
              </section>
              <section class="spri-nyt-column">
                <h2>Adult Nonfiction</h2>
                <div class="spri-nyt-date">Loading…</div>
              </section>
            </div>
          `;
        }
      
        function renderError(message) {
          root.innerHTML = `
            <div class="spri-nyt-error">
              ${escapeHtml(message)}
            </div>
          `;
        }
      
        async function fetchJson(url) {
          const response = await fetch(url);
          const data = await response.json();
      
          if (!response.ok) {
            throw new Error(data.detail || data.error || "Request failed: " + response.status);
          }
      
          return data;
        }
      
        async function loadList(list) {
          const data = await fetchJson(
            workerUrl + "/nyt?list=" + encodeURIComponent(list.key)
          );
      
          return {
            ...list,
            publishedDate: data.published_date || "",
            books: Array.isArray(data.books) ? data.books : []
          };
        }
      
         function renderLists(listData) {
           root.innerHTML = `
             <div class="spri-print-actions">
               <button class="spri-print-button" type="button" onclick="window.print()">
                 Print lists
               </button>
             </div>
         
             <div class="spri-nyt-grid">
               ${listData.map(function (list) {
                 return `
                   <section class="spri-nyt-column">
                     <header class="spri-nyt-header">
                       <img
                         class="spri-brand-logo"
                         src="spriLogo.png"
                         alt="Springfield Township Library logo"
                       >
         
                       <div class="spri-header-text">
                         <div class="spri-brand-name">Springfield Township Library</div>
                         <h2 class="spri-list-title">
                           New York Times ${escapeHtml(list.heading)} Best Sellers
                         </h2>
                         <div class="spri-nyt-date">
                           ${list.publishedDate ? formatDisplayDate(list.publishedDate) : ""}
                         </div>
                       </div>
                     </header>
         
                     <ol class="spri-nyt-list">
                       ${list.books.slice(0, 15).map(function (book, index) {
                         const id = makeBookId(list.key, index);
                         const coverUrl = makeCoverUrl(book);
         
                         return `
                           <li class="spri-nyt-item" id="${escapeHtml(id)}">
                             <div class="spri-nyt-book">
                               ${coverUrl ? `
                                 <span class="spri-nyt-cover-wrap">
                                   <img
                                     class="spri-nyt-cover"
                                     src="${escapeHtml(coverUrl)}"
                                     alt=""
                                     loading="lazy"
                                     onerror="this.closest('.spri-nyt-cover-wrap').remove();"
                                   >
                                 </span>
                               ` : ""}
         
                               <div class="spri-nyt-info">
                                 <div class="spri-nyt-title">
                                   ${escapeHtml(book.title)}
                                 </div>
         
                                 <div class="spri-nyt-author">
                                   by ${escapeHtml(book.author)}
                                 </div>
         
                                 ${book.description ? `
                                   <div class="spri-nyt-desc">
                                     ${escapeHtml(book.description)}
                                   </div>
                                 ` : ""}
         
                                 <div class="spri-nyt-status" data-status="checking">
                                   Checking availability...
                                 </div>
         
                                 <div class="spri-nyt-libby"></div>
                               </div>
                             </div>
                           </li>
                         `;
                       }).join("")}
                     </ol>
                   </section>
                 `;
               }).join("")}
             </div>
           `;
         }
      
        function applyCatalogLink(item, book, data) {
          const titleEl = item.querySelector(".spri-nyt-title");
          const coverWrap = item.querySelector(".spri-nyt-cover-wrap");
          const statusEl = item.querySelector(".spri-nyt-status");
      
          const linkUrl = data.status === "not-found"
            ? makeMelUrl(book)
            : data.catalog_url;
      
          if (!linkUrl) return;
      
          if (titleEl && !titleEl.querySelector("a")) {
            const currentTitle = titleEl.innerHTML;
      
            titleEl.innerHTML = `
              <a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener">
                ${currentTitle}
              </a>
            `;
          }
      
          if (coverWrap && !coverWrap.querySelector("a")) {
            coverWrap.innerHTML = `
              <a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener">
                ${coverWrap.innerHTML}
              </a>
            `;
          }
      
          if (statusEl && !statusEl.querySelector("a")) {
            const currentStatus = statusEl.textContent;
      
            statusEl.innerHTML = `
              <a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener">
                ${escapeHtml(currentStatus)}
              </a>
            `;
          }
        }
      
        function renderLibbyLinks(item, data) {
          const libbyEl = item.querySelector(".spri-nyt-libby");
          if (!libbyEl) return;
      
          const libbyLinks = data.libby_links || {};
          const links = [];
      
          if (libbyLinks.ebook_url) {
            links.push(`
              <a href="${escapeHtml(libbyLinks.ebook_url)}" target="_blank" rel="noopener">
                🕮 eBook available on Libby
              </a>
            `);
          }
      
          if (libbyLinks.eaudiobook_url) {
            links.push(`
              <a href="${escapeHtml(libbyLinks.eaudiobook_url)}" target="_blank" rel="noopener">
                🕪 Audiobook available on Libby
              </a>
            `);
          }
      
          libbyEl.innerHTML = links.join(" ");
        }
      
        async function checkAvailability(list, book, index) {
          const id = makeBookId(list.key, index);
          const item = document.getElementById(id);
          if (!item) return;
      
          const statusEl = item.querySelector(".spri-nyt-status");
          const isbns = getBookIsbns(book);
      
          const params = new URLSearchParams();
          params.set("isbns", isbns.join(","));
      
          try {
            const data = await fetchJson(workerUrl + "/catalog?" + params.toString());
      
            statusEl.textContent = data.label || data.error || "Check catalog";
            statusEl.dataset.status = data.status || "unknown";
      
            applyCatalogLink(item, book, data);
            renderLibbyLinks(item, data);
          } catch (error) {
            statusEl.textContent = "Catalog check failed: " + String(error.message || error);
            statusEl.dataset.status = "error";
          }
        }
      
        function checkAllAvailability(listData) {
          listData.forEach(function (list) {
            list.books.forEach(function (book, index) {
              checkAvailability(list, book, index);
            });
          });
        }

         function formatDisplayDate(value) {
           if (!value) return "";
         
           const parts = String(value).split("-");
           if (parts.length !== 3) return value;
         
           const date = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
         
           return date.toLocaleDateString("en-US", {
             month: "long",
             day: "numeric",
             year: "numeric"
           });
         }
      
        async function init() {
          if (!workerUrl) {
            renderError("Missing Cloudflare Worker URL.");
            return;
          }
      
          renderLoading();
      
          try {
            const listData = await Promise.all(lists.map(loadList));
            renderLists(listData);
            checkAllAvailability(listData);
          } catch (error) {
            renderError("The bestseller lists could not be loaded.");
          }
        }
      
        init();
      })();
      </script>
   </body>
</html>
